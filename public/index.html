<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FestOrders - Login</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        input[type="password"]::-ms-reveal,
        input[type="password"]::-ms-clear {
            display: none;
        }
    </style>
    <script src="config.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
        <div class="splash-content">
            <div class="logo-container">
                <div class="glimpse-ring"></div>
                <img src="logo.jpg" alt="Logo" class="splash-logo">
            </div>
            <div class="splash-loading-container">
                <div id="splash-status" class="loader-text">Waking up the system...</div>

                <div id="timer-container" class="splash-timer-container">
                    <div id="splash-timer" class="splash-timer">00:30</div>
                    <p class="splash-message">As we are using a free server, it takes a few seconds to wake up. Hang
                        tight!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const splash = document.getElementById('splash-screen');
            const timerContainer = document.getElementById('timer-container');
            const timerDisplay = document.getElementById('splash-timer');
            const statusText = document.getElementById('splash-status');

            const startTime = Date.now();
            const minDisplayTime = 2000; // 2 seconds (at least two full rotations of inner ring)
            let timeLeft = 30;
            let timerInterval;
            let isDismissed = false;

            // Function to check if backend is awake
            async function checkHealth() {
                if (isDismissed) return;
                try {
                    const res = await fetch(getApiUrl('/api/health'));
                    if (res.ok) {
                        tryFinishSplash();
                    }
                } catch (e) {
                    // Still asleep or network issue
                }
            }

            function tryFinishSplash() {
                const elapsed = Date.now() - startTime;
                const remaining = Math.max(0, minDisplayTime - elapsed);

                setTimeout(() => {
                    finishSplashNow();
                }, remaining);
            }

            function finishSplashNow() {
                if (isDismissed) return;
                isDismissed = true;
                clearInterval(timerInterval);
                splash.classList.add('fade-out');
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 800);
            }

            function startTimer() {
                if (timerContainer) timerContainer.style.display = 'block';
                if (statusText) statusText.style.display = 'none';

                timerInterval = setInterval(() => {
                    timeLeft--;
                    const seconds = timeLeft < 10 ? `0${timeLeft}` : timeLeft;
                    if (timerDisplay) timerDisplay.textContent = `00:${seconds}`;

                    if (timeLeft <= 0) {
                        finishSplashNow();
                    } else {
                        checkHealth();
                    }
                }, 1000);
            }

            // Initial immediate check
            checkHealth();

            // After 2 seconds, if still here, show the timer
            setTimeout(() => {
                if (!isDismissed) {
                    startTimer();
                }
            }, 2500);

            // Periodically check if timer isn't started yet
            const healthInterval = setInterval(() => {
                if (isDismissed) {
                    clearInterval(healthInterval);
                } else {
                    checkHealth();
                }
            }, 3000);
        });
    </script>

    <!-- Background Shapes -->
    <div id="background-animation"></div>
    <!-- Old shapes commented out or removed as we are replacing them -->
    <!-- <div class="shape"></div> -->
    <!-- <div class="shape"></div> -->

    <!-- Floating Geometric Decor (Screen Edges) -->

    <div class="wrapper">
        <!-- LOGO / HEADER -->
        <!-- (Optional Logo) -->

        <!-- LOGIN FORM -->
        <div id="login-section" style="width: 100%;">
            <h2>Login</h2>
            <form id="authLoginForm">
                <div class="input-box">
                    <input type="text" id="login-identifier" required>
                    <label>Username / Email</label>
                </div>
                <div class="input-box">
                    <input type="password" id="login-password" required>
                    <span class="toggle-password"
                        style="position: absolute; right: 0; top: 10px; cursor: pointer; color: white;">👁️</span>
                    <label>Password</label>
                </div>

                <button type="submit" class="btn">Enter Void</button>
                
                <!-- Google Login Button Container -->
                <div id="google-login-container" class="google-signin-section">
                    <div class="google-separator">OR</div>
                    <div id="g_id_signin"></div>
                </div>

                <div id="login-message" class="message hidden"></div>

                <div class="toggle-link">
                    <p>New Explorer? <a href="#" id="show-register">Register Here</a></p>
                    <p style="margin-top: 10px; font-size: 0.8rem;">
                        <a href="#" id="forgot-password-link">Forgot Password?</a>
                    </p>

                    <div style="text-align: center;">
                        <a href="/admin.html" class="admin-btn">Admin Dashboard</a>
                    </div>
                </div>
            </form>
        </div>

        <!-- REGISTER FORM -->
        <div id="register-section" style="display: none; width: 100%;">
            <h2>Register</h2>
            <form id="authSignupForm">
                <div class="input-box">
                    <input type="text" id="signup-name" required>
                    <label>Full Name</label>
                </div>
                <div class="input-box">
                    <input type="text" id="signup-identifier" required>
                    <label>WhatsApp Number</label>
                </div>
                <div class="input-box">
                    <input type="email" id="signup-email" required>
                    <label>Email Address</label>
                </div>
                <div class="input-box">
                    <input type="password" id="signup-password" required>
                    <span class="toggle-password"
                        style="position: absolute; right: 0; top: 10px; cursor: pointer; color: white;">👁️</span>
                    <label>Create Password</label>
                </div>

                <button type="submit" class="btn">Launch</button>
                <div id="signup-message" class="message hidden"></div>

                <div class="toggle-link">
                    <p>Already aboard? <a href="#" id="show-login">Login Here</a></p>
                </div>
            </form>
        </div>
    </div>

    <!-- Forgot Password Overlay -->
    <div id="forgot-password-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center;">
        <div class="wrapper" style="animation: none; max-width: 350px;">
            <!-- Reuse wrapper styling but disable float -->
            <h2>Reset</h2>
            <form id="resetRequestForm" style="width: 100%;">
                <div class="input-box">
                    <input type="email" id="reset-email" required>
                    <label>Email Address</label>
                </div>
                <button type="submit" class="btn">Send Link</button>
                <div id="reset-message" class="message hidden"></div>
                <div style="margin-top: 20px; text-align: center;">
                    <a href="#" id="close-forgot-modal" style="color: white; text-decoration: none;">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function () { emailjs.init({ publicKey: "5f0UtiAsI5s7IRS2V" }); })();
    </script>
    <script src="script.js"></script>
</body>

</html>
